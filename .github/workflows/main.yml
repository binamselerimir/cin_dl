name: Run CIN DL with Inputs
on:
  workflow_dispatch:
    inputs:
      my_number:
        description: 'Enter the number'
        required: true
        default: '261836'
        type: string
      my_boolean:
        description: 'Boolean flag'
        required: true
        default: 'Flase'
        type: boolean
jobs:
  run-app:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium
    - name: Run CIN DL script
      run: |
        python main-git.py ${{ github.event.inputs.my_number }} ${{ github.event.inputs.my_boolean }}
    - name: Commit and Push downloaded files
      run: |
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add . 
        if git diff --quiet && git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto-upload [skip ci]"
          git push
        fi
