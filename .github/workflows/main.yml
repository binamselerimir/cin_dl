name: Download and commit images

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"  # daily at 03:00 UTC

permissions:
  contents: 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  # needed to push commits via GITHUB_TOKEN

jobs:
  download-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright

      - name: Install Playwright browsers
        uses: microsoft/playwright-github-action@v1

      - name: Run downloader script
        run: |
          # Example: pass args/env if your script needs them
          # export TARGET_URL="https://example.com"
          # export OUTPUT_DIR="downloaded_images"
          python main.py https://cin.red/v/595232

      - name: Commit and push changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Optionally restrict to a folder, e.g.: git add downloaded_images/
          git add -A

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update downloaded images [skip ci]"
          git push
